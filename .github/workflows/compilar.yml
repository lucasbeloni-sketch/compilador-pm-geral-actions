name: Compilar PM_GERAL (ESPELHO)

on:
  schedule:
    - cron: "*/30 * * * *"   # a cada 30 min. Ajuste a frequencia se quiser.
  workflow_dispatch: {}        # botao manual na aba Actions

permissions:
  contents: read
  issues: write                # pra abrir/comentar issue de falha

# Evita 2 runs simultaneos (cron + manual) escrevendo no mesmo destino.
concurrency:
  group: compilar-pm-geral
  cancel-in-progress: false

jobs:
  compilar:
    runs-on: ubuntu-latest
    timeout-minutes: 30           # planilhas de origem sao grandes; leitura pode demorar
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Testes unitarios
        run: npm test

      - name: Compilar origens no destino
        run: npm start
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

  notify:
    needs: compilar
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = "compilar-pm-geral-falha";
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { owner, repo } = context.repo;
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: label });
            const body = `A compilacao da PM_GERAL (ESPELHO) falhou no run ${context.runId}.\n\nLog: ${url}\n\nO destino pode estar desatualizado ate o proximo run dar certo.`;
            if (open.data.length) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: "Compilador PM_GERAL falhando", body, labels: [label] });
            }
